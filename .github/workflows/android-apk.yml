name: Android APK

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        if: github.event_name != 'release' && !startsWith(github.ref, 'refs/tags/')
        run: ./gradlew :app:assembleDebug

      - name: Validate release signing secrets
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        env:
          ANDROID_SIGNING_KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          missing=0
          for name in \
            ANDROID_SIGNING_KEYSTORE_BASE64 \
            ANDROID_SIGNING_STORE_PASSWORD \
            ANDROID_SIGNING_KEY_ALIAS \
            ANDROID_SIGNING_KEY_PASSWORD
          do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required release signing secret: ${name}"
              missing=1
            fi
          done
          exit "${missing}"

      - name: Decode release keystore
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        env:
          ANDROID_SIGNING_KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
        run: |
          keystore_path="${RUNNER_TEMP}/yar-release.keystore"
          printf '%s' "${ANDROID_SIGNING_KEYSTORE_BASE64}" | base64 --decode > "${keystore_path}"
          echo "ANDROID_SIGNING_STORE_FILE=${keystore_path}" >> "${GITHUB_ENV}"

      - name: Build signed release APK
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        env:
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Prepare APK artifact
        id: package
        run: |
          mkdir -p build/release-artifacts
          if [ "${GITHUB_EVENT_NAME}" = "release" ] || [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
              tag_name="${{ github.event.release.tag_name }}"
            else
              tag_name="${GITHUB_REF_NAME}"
            fi
            release_apks=(app/build/outputs/apk/release/*.apk)
            source_apk="${release_apks[0]}"
            apk_name="yar-android-${tag_name}.apk"
          else
            source_apk="app/build/outputs/apk/debug/app-debug.apk"
            apk_name="yar-android-debug-${GITHUB_SHA::7}.apk"
          fi
          destination="build/release-artifacts/${apk_name}"
          cp "${source_apk}" "${destination}"
          echo "apk_name=${apk_name}" >> "${GITHUB_OUTPUT}"
          echo "apk_path=${destination}" >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.apk_name }}
          path: ${{ steps.package.outputs.apk_path }}
          if-no-files-found: error

      - name: Attach APK to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ steps.package.outputs.apk_path }}" --clobber

      - name: Create GitHub Release from tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${{ steps.package.outputs.apk_path }}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${{ steps.package.outputs.apk_path }}" \
              --title "Yar Android ${GITHUB_REF_NAME}" \
              --notes "Yar Android ${GITHUB_REF_NAME} release."
          fi
